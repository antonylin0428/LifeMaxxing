name: LifeMaxxing
options:
  bundleIdPrefix: com.lifemaxxing
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  AmplifySwift:
    url: https://github.com/aws-amplify/amplify-swift
    from: 2.0.0

targets:
  LifeMaxxing:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LifeMaxxing
    info:
      path: LifeMaxxing/Resources/Info.plist
      properties:
        CFBundleDisplayName: LifeMaxxing
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lifemaxxing.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: true
        TARGETED_DEVICE_FAMILY: "1" # iPhone only for MVP
    dependencies:
      - package: AmplifySwift
        product: Amplify
      - package: AmplifySwift
        product: AWSCognitoAuthPlugin
